<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026 comodidies</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .calculator { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .result { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 4px; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>Calculadora de Exportação</h2>
    
    <div class="input-group">
        <label for="peso">Peso da Carga (em Toneladas):</label>
        <input type="number" id="peso" placeholder="Ex: 500">
    </div>

    <div class="input-group">
        <label for="preco">Preço por Tonelada (em USD):</label>
        <input type="number" id="preco" placeholder="Ex: 450.50">
    </div>

    <div class="input-group">
        <label for="cambio">Taxa de Câmbio (USD para BRL):</label>
        <input type="number" id="cambio" placeholder="Ex: 5.50">
    </div>

    <div class="input-group">
        <label for="custos">Custos Operacionais/Frete (em BRL):</label>
        <input type="number" id="custos" placeholder="Ex: 15000">
    </div>

    <button onclick="calcularExportacao()">Calcular</button>

    <div class="result" id="resultado">
        <h3>Resultado:</h3>
        <p>Receita Bruta: R$ 0.00</p>
        <p>Lucro Líquido: R$ 0.00</p>
    </div>
</div>

<script>
    function calcularExportacao() {
        // Pega os valores inseridos pelo usuário
        const peso = parseFloat(document.getElementById('peso').value);
        const precoUsd = parseFloat(document.getElementById('preco').value);
        const cambio = parseFloat(document.getElementById('cambio').value);
        const custos = parseFloat(document.getElementById('custos').value) || 0;

        // Validação básica
        if (isNaN(peso) || isNaN(precoUsd) || isNaN(cambio)) {
            alert("Por favor, preencha os campos obrigatórios (Peso, Preço e Câmbio).");
            return;
        }

        // Cálculos
        const receitaBrutaUsd = peso * precoUsd;
        const receitaBrutaBrl = receitaBrutaUsd * cambio;
        const lucroLiquido = receitaBrutaBrl - custos;

        // Exibe o resultado formatado em Reais
        const formatoMoeda = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        document.getElementById('resultado').innerHTML = `
            <h3>Resultado:</h3>
            <p><strong>Receita Bruta (USD):</strong> $ ${receitaBrutaUsd.toLocaleString('en-US', {minimumFractionDigits: 2})}</p>
            <p><strong>Receita Bruta (BRL):</strong> ${formatoMoeda.format(receitaBrutaBrl)}</p>
            <p><strong>Lucro Líquido (BRL):</strong> ${formatoMoeda.format(lucroLiquido)}</p>
        `;
    }
</script>

</body>
</html>
