<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrinho 2026</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e0e0e0;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .calculadora {
            background-color: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            width: 320px;
        }
        .visor {
            width: 100%;
            height: 50px;
            background-color: #222;
            color: #fff;
            font-size: 24px;
            text-align: right;
            padding: 5px;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #f0f0f0;
            transition: 0.2s;
        }
        button:hover { background-color: #ddd; }
        button.operador { background-color: #ff9500; color: white; }
        button.operador:hover { background-color: #e08500; }
        button.limpar { background-color: #ff3b30; color: white; }
        button.limpar:hover { background-color: #d32f2f; }
    </style>
</head>
<body>

<div class="calculadora">
    <input type="text" id="visor" class="visor" disabled>
    <div class="botoes">
        <button class="limpar" onclick="limparVisor()">C</button>
        <button onclick="adicionarValor('/')" class="operador">/</button>
        <button onclick="adicionarValor('*')" class="operador">*</button>
        <button onclick="adicionarValor('-')" class="operador">-</button>
        
        <button onclick="adicionarValor('7')">7</button>
        <button onclick="adicionarValor('8')">8</button>
        <button onclick="adicionarValor('9')">9</button>
        <button onclick="adicionarValor('+')" class="operador">+</button>
        
        <button onclick="adicionarValor('4')">4</button>
        <button onclick="adicionarValor('5')">5</button>
        <button onclick="adicionarValor('6')">6</button>
        <button onclick="calcular()" class="operador" style="grid-row: span 2; height: 100%;">=</button>
        
        <button onclick="adicionarValor('1')">1</button>
        <button onclick="adicionarValor('2')">2</button>
        <button onclick="adicionarValor('3')">3</button>
        
        <button onclick="adicionarValor('0')" style="grid-column: span 2;">0</button>
        <button onclick="adicionarValor('.')">.</button>
    </div>
</div>

<script>
    const visor = document.getElementById('visor');

    function adicionarValor(valor) {
        visor.value += valor;
    }

    function limparVisor() {
        visor.value = '';
    }

    function calcular() {
        try {
            // O eval() calcula a expressão matemática dentro da string
            visor.value = eval(visor.value);
        } catch (erro) {
            visor.value = 'Erro';
        }
    }
</script>

</body>
</html>
